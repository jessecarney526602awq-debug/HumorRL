services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    volumes: [./data:/app/data]
    env_file: [.env]
    restart: unless-stopped

  scheduler:
    build: .
    command: python scheduler.py
    volumes: [./data:/app/data]
    env_file: [.env]
    depends_on: [api]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:80"]
    depends_on: [api]
    restart: unless-stopped
