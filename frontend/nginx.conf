server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — 所有路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反代 API 请求到 FastAPI 服务
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
